<script>
// ===== 原子データ =====
const atom_freq = {
  H: 128.16,
  C: 100.36,
  O: 91.85,
  N: 96.01,
  Cl: 45.0,
  S: 64.28
};

// ===== 化学式パース =====
function parseFormula(formula) {
  const regex = /([A-Z][a-z]?)(\d*)/g;
  let match;
  let result = {};
  while ((match = regex.exec(formula)) !== null) {
    const el = match[1];
    const count = match[2] ? parseInt(match[2]) : 1;
    if (atom_freq[el]) {
      result[el] = (result[el] || 0) + count;
    }
  }
  return result;
}

// ===== ローカルミニマム判定 =====
function isLocalMinimum(errors, i) {
  return errors[i] < errors[i-1] && errors[i] < errors[i+1];
}

// ===== dz分類 =====
function classifyDz(dz) {
  if (dz > 200000) return "A: Linear";
  if (dz > 80000) return "B: Branched";
  if (dz > 20000) return "C: Compact";
  if (dz > 5000) return "D: Ring";
  if (dz > 1000) return "E: Small Ring";
  return "F: Ultra Compact";
}

// ===== メイン =====
function runScan() {
  const formula = document.getElementById("formula").value;
  const parsed = parseFormula(formula);

  let freq_sum = 0;
  for (let el in parsed) {
    freq_sum += atom_freq[el] * parsed[el];
  }

  let step = 0.001;
  let errors = [];
  let ks = [];

  for (let k = 0.1; k <= 20; k += step) {
    let error = 0;
    for (let el in parsed) {
      let val = atom_freq[el] * k;
      error += Math.abs(val - Math.round(val));
    }
    ks.push(k);
    errors.push(error);
  }

  let peaks = [];
  for (let i = 1; i < errors.length - 1; i++) {
    if (isLocalMinimum(errors, i) && errors[i] < 0.05) {
      peaks.push({k: ks[i], error: errors[i]});
    }
  }

  peaks.sort((a,b)=>a.error-b.error);
  let top = peaks.slice(0,6).sort((a,b)=>a.k-b.k);

  let out = "";
  if (top.length === 0) {
    out = "No resonance modes found.";
  } else {
    top.forEach((p,i)=>{
      let dz = Math.pow((freq_sum / (1.02 * p.k)),2);
      let type = classifyDz(dz);
      out += `
      <b>Mode ${i+1}</b><br>
      K = ${p.k.toFixed(4)}<br>
      dz = ${dz.toFixed(1)}<br>
      Type = ${type}<br><br>
      `;
    });
  }

  document.getElementById("output").innerHTML = out;
}
</script>
