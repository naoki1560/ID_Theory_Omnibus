<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Theory: 万物演繹マシン</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: #fcfcfc; }
        input { font-size: 16px; padding: 10px; width: 60%; max-width: 250px; }
        button { font-size: 16px; padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; }
        pre { background: #eee; padding: 12px; overflow-x: auto; font-size: 14px; line-height: 1.5; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>ID Theory: 世代問題・万物演繹ツール</h2>
    <p>入力された座から、3世代分の質量・座標スライドと全物性を純粋演繹します。</p>
    
    <input type="text" id="formula" placeholder="例: Ca(OH)2, H2O" />
    <button onclick="runDeduction()">演繹開始</button>
    
    <pre id="result">ここに演繹結果が表示されます</pre>

    <script>
        let db = [];
        // マスターデータの読み込み
        fetch('ID_Master_Database.csv').then(r => r.text()).then(text => {
            let lines = text.split('\n');
            let headers = lines[0].split(',');
            for(let i=1; i<lines.length; i++){
                if(!lines[i].trim()) continue;
                let cols = lines[i].split(',');
                let obj = {};
                headers.forEach((h, idx) => obj[h.trim()] = cols[idx].trim());
                db.push(obj);
            }
        }).catch(e => document.getElementById('result').innerText = "CSVの読み込みに失敗しました。");

        function hexToInt(h) {
            if(!h) return 0;
            return parseInt(h, 16);
        }

        // カッコ対応の化学式パーサー
        function parseFormula(formula) {
            let stack = [{}];
            let i = 0;
            while (i < formula.length) {
                let char = formula[i];
                if (char === '(') {
                    stack.push({});
                    i++;
                } else if (char === ')') {
                    let top = stack.pop();
                    i++;
                    let countStr = '';
                    while (i < formula.length && /[0-9]/.test(formula[i])) {
                        countStr += formula[i];
                        i++;
                    }
                    let count = countStr === '' ? 1 : parseInt(countStr);
                    let current = stack[stack.length - 1];
                    for (let sym in top) {
                        current[sym] = (current[sym] || 0) + top[sym] * count;
                    }
                } else if (/[A-Z]/.test(char)) {
                    let sym = char;
                    i++;
                    if (i < formula.length && /[a-z]/.test(formula[i])) {
                        sym += formula[i];
                        i++;
                    }
                    let countStr = '';
                    while (i < formula.length && /[0-9]/.test(formula[i])) {
                        countStr += formula[i];
                        i++;
                    }
                    let count = countStr === '' ? 1 : parseInt(countStr);
                    let current = stack[stack.length - 1];
                    current[sym] = (current[sym] || 0) + count;
                } else {
                    i++;
                }
            }
            return stack[0];
        }

        function runDeduction() {
            let formula = document.getElementById('formula').value.trim();
            if(!formula || db.length === 0) return;
            
            let parsed = parseFormula(formula);
            
            // 安全装置：有効な元素が認識できなかった場合はストップ
            if (Object.keys(parsed).length === 0) {
                document.getElementById('result').innerText = "エラー: 有効な化学式が入力されていません。";
                return;
            }

            let base_mass = 0, base_depth = 0, max_w_ratio = 1.0;

            // 第1世代の初期パラメータ合算
            for (let sym in parsed) {
                let row = db.find(r => r.Symbol === sym);
                if(!row) {
                    document.getElementById('result').innerText = "エラー: 元素 " + sym + " がマスターデータに見つかりません。";
                    return;
                }
                let m = parseFloat(row.Mass);
                let zc = hexToInt(row.Zc_Hex);
                let w = hexToInt(row.W_Hex);
                if(w === 0) w = 32768;
                
                base_mass += m * parsed[sym];
                base_depth += (w - zc) * parsed[sym];
                max_w_ratio = Math.max(max_w_ratio, w / 32768.0);
            }

            let out = "【入力された座】: " + formula + "\n";
            out += "=================================================\n";
            let neutron_unit = 1.00866; // 同位体ジャンプ単位

            // 世代問題に基づく3スロットの演繹
            for(let gen = 1; gen <= 3; gen++) {
                let gen_mass = base_mass + (gen - 1) * neutron_unit;
                // 質量増分による空間深度の再計算（幾何学的スライド）
                let gen_depth = base_mass > 0 ? base_depth * Math.sqrt(gen_mass / base_mass) : base_depth;
                
                // オムニバス物性演繹 (ZPE, スペクトル, 溶解ポテンシャル, 熱力学指標)
                let zpe = (gen_depth / 100.0) * gen_mass;
                let ev = (zpe / gen_mass) * max_w_ratio * 4.5;
                let l_max = ev > 0 ? 1240.0 / ev : 0;
                let polarity_potential = (gen_depth * max_w_ratio) / gen_mass; 
                let thermal_index = ((gen_depth / gen_mass) * 1.5) * Math.exp(120.0 * (max_w_ratio - 1.0)) - 273.15;

                out += "■ " + (gen === 1 ? "第1世代 (Base)" : "第" + gen + "世代") + "\n";
                out += "  ├ 精密質量: " + gen_mass.toFixed(3) + "\n";
                out += "  ├ 空間深度 (W-Zc): " + gen_depth.toFixed(1) + "\n";
                out += "  ├ 零点エネルギー(ZPE): " + zpe.toFixed(2) + " eV\n";
                out += "  ├ 吸収スペクトル: " + l_max.toFixed(2) + " nm\n";
                out += "  ├ 極性ポテンシャル: " + polarity_potential.toFixed(3) + "\n";
                out += "  └ 熱力学指標: " + thermal_index.toFixed(1) + " C\n";
                out += "-------------------------------------------------\n";
            }
            
            document.getElementById('result').innerText = out;
        }
    </script>
</body>
</html>
